<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Refettorio Guest Check-In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #2d2d2d;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #2d2d2d;
    }

    .guest-count {
      font-size: 16px;
      color: #888;
      font-weight: 500;
    }

    .guest-count span {
      color: #4CAF82;
      font-weight: 700;
    }

    /* Offline banner */
    .offline-banner {
      display: none;
      background: #e74c3c;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .offline-banner.show {
      display: block;
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      gap: 6px;
      overflow: hidden;
    }

    /* Section cards */
    .section {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
    }

    .section.hidden {
      display: none;
    }

    .section-auto {
      flex: 0 0 auto;
    }

    .section-flex {
      flex: 1;
      min-height: 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Text input */
    .autocomplete-wrapper {
      position: relative;
    }

    .text-input {
      width: 100%;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      outline: none;
    }

    .text-input:focus {
      border-color: #4CAF82;
    }

    .text-input::placeholder {
      color: #bbb;
    }

    /* Autocomplete dropdown */
    .autocomplete-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 2px solid #4CAF82;
      border-top: none;
      border-radius: 0 0 8px 8px;
      z-index: 50;
      max-height: 200px;
      overflow-y: auto;
    }

    .autocomplete-list.show {
      display: block;
    }

    .autocomplete-item {
      padding: 10px 12px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .autocomplete-item:active {
      background: #e8f5e9;
    }

    .autocomplete-item .ac-zip {
      color: #999;
      font-size: 15px;
    }

    /* Other zip input row */
    .other-zip-row {
      display: none;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .other-zip-row.show {
      display: flex;
    }

    .zip-input {
      width: 120px;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      text-align: center;
      outline: none;
    }

    .zip-input:focus {
      border-color: #4CAF82;
    }

    .zip-ok-btn {
      min-height: 44px;
      padding: 8px 20px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #4CAF82;
      color: #fff;
      cursor: pointer;
    }

    /* Button grids */
    .btn-grid {
      display: grid;
      gap: 6px;
      flex: 1;
    }

    .btn-grid.cols-2 {
      grid-template-columns: 1fr 1fr;
    }

    .btn-grid.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .btn-grid.zip-grid {
      grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* Selection buttons */
    .btn {
      font-size: 20px;
      font-weight: 600;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      user-select: none;
      min-height: 0;
    }

    .btn:active {
      background: #e8f5e9;
    }

    .btn.selected {
      background: #4CAF82;
      border-color: #4CAF82;
      color: #ffffff;
    }

    .btn-other {
      font-size: 18px;
      color: #999;
    }

    /* Inline counter (inside visit type buttons) */
    .inline-counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 8px;
    }

    .inline-counter.hidden {
      display: none;
    }

    .inline-counter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      color: #fff;
      user-select: none;
      cursor: pointer;
    }

    .inline-counter-btn:active {
      background: rgba(255,255,255,0.5);
    }

    .inline-counter-val {
      font-size: 26px;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }

    /* Counter (bags) */
    .counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
    }

    .counter-btn {
      width: 64px;
      height: 64px;
      font-size: 32px;
      font-weight: 700;
      border: 2px solid #e0e0e0;
      border-radius: 50%;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background 0.12s;
    }

    .counter-btn:active {
      background: #e8f5e9;
    }

    .counter-value {
      font-size: 48px;
      font-weight: 700;
      color: #2d2d2d;
      min-width: 80px;
      text-align: center;
    }

    /* First Visit toggle (inline in age section) */
    .first-visit-row {
      margin-top: 6px;
    }

    .first-visit-btn {
      width: 100%;
      min-height: 40px;
      font-size: 17px;
      font-weight: 600;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      user-select: none;
    }

    .first-visit-btn.selected {
      background: #4CAF82;
      border-color: #4CAF82;
      color: #ffffff;
    }

    /* Service type toggle (inside form) */
    .service-toggle {
      display: flex;
      background: #e8e8e8;
      border-radius: 10px;
      padding: 3px;
    }

    .service-btn {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #999;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .service-btn.active {
      background: #4CAF82;
      color: #ffffff;
    }

    /* Check In button */
    .submit-bar {
      padding: 8px 12px 12px;
    }

    .btn-submit {
      width: 100%;
      min-height: 60px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: #ddd;
      color: #fff;
      cursor: not-allowed;
      transition: background 0.15s;
      user-select: none;
    }

    .btn-submit.ready {
      background: #4CAF82;
      cursor: pointer;
    }

    .btn-submit.ready:active {
      background: #3d9e72;
    }

    /* Success flash */
    .flash {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(76, 175, 130, 0.18);
      z-index: 100;
      pointer-events: none;
    }

    .flash.show {
      display: block;
      animation: flashAnim 0.4s ease-out forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Queue indicator */
    .queue-count {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: #e74c3c;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .queue-count.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Refettorio Harlem</h1>
    <div class="guest-count">Today: <span id="guestCount">0</span> guests</div>
  </div>

  <div class="offline-banner" id="offlineBanner">Offline — submissions will sync when wifi returns</div>

  <div class="flash" id="flash"></div>

  <div class="main" id="mainContent">

    <!-- 1. Name with autocomplete -->
    <div class="section section-auto" id="sectionName">
      <div class="section-label">Name (optional)</div>
      <div class="autocomplete-wrapper">
        <input type="text" class="text-input" id="nameInput" placeholder="First name or skip" autocomplete="off" autocorrect="off" autocapitalize="words" tabindex="1">
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>
    </div>

    <!-- 2. Zip Code -->
    <div class="section section-flex" id="sectionZip">
      <div class="section-label">Zip Code</div>
      <div class="btn-grid zip-grid">
        <button class="btn" data-zip="10026" tabindex="2">10026</button>
        <button class="btn" data-zip="10027" tabindex="2">10027</button>
        <button class="btn" data-zip="10029" tabindex="2">10029</button>
        <button class="btn" data-zip="10031" tabindex="2">10031</button>
        <button class="btn" data-zip="10035" tabindex="2">10035</button>
        <button class="btn" data-zip="10037" tabindex="2">10037</button>
        <button class="btn" data-zip="10039" tabindex="2">10039</button>
        <button class="btn btn-other" data-zip="other" tabindex="2">Other</button>
      </div>
      <div class="other-zip-row" id="otherZipRow">
        <input type="number" class="zip-input" id="otherZipInput" placeholder="Zip" maxlength="5" inputmode="numeric" tabindex="2">
        <button class="zip-ok-btn" id="otherZipOk" tabindex="2">OK</button>
      </div>
    </div>

    <!-- 3. Age Range + First Visit -->
    <div class="section section-flex" id="sectionAge">
      <div class="section-label">Age Range</div>
      <div class="btn-grid cols-3">
        <button class="btn" data-age="Under 18" tabindex="3">Under 18</button>
        <button class="btn" data-age="18-59" tabindex="3">18 – 59</button>
        <button class="btn" data-age="60+" tabindex="3">60+</button>
      </div>
      <div class="first-visit-row">
        <button class="first-visit-btn" id="firstVisitBtn" tabindex="4">First Visit</button>
      </div>
    </div>

    <!-- 4. Service Type -->
    <div class="section section-auto" id="sectionService">
      <div class="section-label">Service Type</div>
      <div class="service-toggle">
        <button class="service-btn" id="modeRestaurant" data-mode="restaurant" tabindex="5">Restaurant</button>
        <button class="service-btn" id="modePantry" data-mode="pantry" tabindex="5">Pantry</button>
        <button class="service-btn" id="modeBoth" data-mode="both" tabindex="5">Both</button>
      </div>
    </div>

    <!-- 5. Visit Type (restaurant / both — hidden until mode selected) -->
    <div class="section section-flex hidden" id="sectionVisit">
      <div class="section-label">Visit Type</div>
      <div class="btn-grid cols-2">
        <button class="btn" data-visit="Dining In" id="dineinBtn" tabindex="6">
          <span id="dineinLabel">Dining In</span>
          <span id="dineinCounter" class="inline-counter hidden">
            <span class="inline-counter-btn" id="guestsMinus">&minus;</span>
            <span class="inline-counter-val" id="guestsValue">1</span>
            <span class="inline-counter-btn" id="guestsPlus">+</span>
          </span>
        </button>
        <button class="btn" data-visit="Taking Away" id="takeawayBtn" tabindex="6">
          <span id="takeawayLabel">Taking Away</span>
          <span id="takeawayCounter" class="inline-counter hidden">
            <span class="inline-counter-btn" id="mealsMinus">&minus;</span>
            <span class="inline-counter-val" id="mealsValue">1</span>
            <span class="inline-counter-btn" id="mealsPlus">+</span>
          </span>
        </button>
      </div>
    </div>

    <!-- 6. Bags counter (pantry / both — hidden until mode selected) -->
    <div class="section section-flex hidden" id="sectionBags">
      <div class="section-label">Number of Bags</div>
      <div class="counter">
        <button class="counter-btn" id="bagsMinus" tabindex="7">&minus;</button>
        <div class="counter-value" id="bagsValue">1</div>
        <button class="counter-btn" id="bagsPlus" tabindex="7">+</button>
      </div>
    </div>

  </div>

  <div class="submit-bar">
    <button class="btn-submit" id="submitBtn" disabled tabindex="8">Check In</button>
  </div>

  <div class="queue-count" id="queueCount"></div>

  <script>
    // ─── State ────────────────────────────────────────────────────
    const QUEUE_KEY = 'refettorio_checkin_queue';
    const COUNT_KEY = 'refettorio_guest_count';
    const COUNT_DATE_KEY = 'refettorio_guest_count_date';
    const MODE_KEY = 'refettorio_checkin_mode';
    const HISTORY_KEY = 'refettorio_guest_history';

    let mode = localStorage.getItem(MODE_KEY) || '';
    let guestData = { name: '', zipCode: '', visitType: '', ageRange: '', meals: 1, guests: 1, bags: 1, firstVisit: false };
    let localCount = loadLocalCount();

    const submitBtn = document.getElementById('submitBtn');
    const nameInput = document.getElementById('nameInput');
    const mainContent = document.getElementById('mainContent');
    const autocompleteList = document.getElementById('autocompleteList');

    // ─── Init ─────────────────────────────────────────────────────
    if (mode) applyMode(mode, false);
    updateCountDisplay();
    fetchServerCount();
    processQueue();

    // Online/offline
    window.addEventListener('online', () => {
      document.getElementById('offlineBanner').classList.remove('show');
      setTimeout(processQueue, 1000);
      setTimeout(processQueue, 5000);
      setTimeout(processQueue, 15000);
    });
    window.addEventListener('offline', () => {
      document.getElementById('offlineBanner').classList.add('show');
    });
    if (!navigator.onLine) {
      document.getElementById('offlineBanner').classList.add('show');
    }

    // ─── Guest History (autocomplete) ─────────────────────────────
    function getGuestHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveGuestToHistory(name, zipCode) {
      if (!name || name === 'Anonymous Guest') return;
      const history = getGuestHistory();
      history[name.toLowerCase()] = { name: name, zipCode: zipCode };
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    nameInput.addEventListener('input', () => {
      const val = nameInput.value.trim().toLowerCase();
      if (val.length < 1) {
        hideAutocomplete();
        return;
      }
      const history = getGuestHistory();
      const matches = Object.values(history)
        .filter(g => g.name.toLowerCase().startsWith(val))
        .slice(0, 5);
      if (matches.length === 0) {
        hideAutocomplete();
        return;
      }
      autocompleteList.innerHTML = matches.map(g =>
        '<div class="autocomplete-item" data-acname="' + escapeHtml(g.name) + '" data-aczip="' + escapeHtml(g.zipCode) + '">' +
          '<span>' + escapeHtml(g.name) + '</span>' +
          '<span class="ac-zip">' + escapeHtml(g.zipCode) + '</span>' +
        '</div>'
      ).join('');
      autocompleteList.classList.add('show');
    });

    autocompleteList.addEventListener('click', (e) => {
      const item = e.target.closest('.autocomplete-item');
      if (!item) return;
      const name = item.getAttribute('data-acname');
      const zip = item.getAttribute('data-aczip');
      nameInput.value = name;
      guestData.name = name;
      selectZipCode(zip);
      hideAutocomplete();
    });

    nameInput.addEventListener('blur', () => {
      // Delay to allow click on autocomplete item
      setTimeout(hideAutocomplete, 200);
    });

    function hideAutocomplete() {
      autocompleteList.classList.remove('show');
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Programmatically select a zip code
    function selectZipCode(zip) {
      // Clear current selection
      document.querySelectorAll('[data-zip]').forEach(b => b.classList.remove('selected'));
      document.getElementById('otherZipRow').classList.remove('show');
      document.getElementById('otherZipInput').value = '';

      // Try to find a matching button
      const matchBtn = document.querySelector('[data-zip="' + zip + '"]');
      if (matchBtn) {
        matchBtn.classList.add('selected');
        guestData.zipCode = zip;
      } else if (zip) {
        // It's a custom zip — set as "other"
        document.querySelector('[data-zip="other"]').classList.add('selected');
        document.getElementById('otherZipInput').value = zip;
        guestData.zipCode = zip;
      }
      updateSubmitState();
    }

    // ─── Mode / Service Type ──────────────────────────────────────
    document.querySelectorAll('[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        const newMode = btn.getAttribute('data-mode');
        if (mode === newMode) return; // already selected
        applyMode(newMode, false);
      });
    });

    function applyMode(newMode, shouldReset) {
      mode = newMode;
      localStorage.setItem(MODE_KEY, mode);

      // Update toggle buttons
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.getAttribute('data-mode') === mode));

      // Show/hide conditional sections
      const showVisit = mode === 'restaurant' || mode === 'both';
      const showBags = mode === 'pantry' || mode === 'both';
      document.getElementById('sectionVisit').classList.toggle('hidden', !showVisit);
      document.getElementById('sectionBags').classList.toggle('hidden', !showBags);

      // Reset only mode-specific data (NOT common fields)
      if (!showVisit) {
        guestData.visitType = '';
        guestData.meals = 1;
        guestData.guests = 1;
        document.querySelectorAll('[data-visit]').forEach(b => b.classList.remove('selected'));
        document.getElementById('takeawayCounter').classList.add('hidden');
        document.getElementById('takeawayLabel').textContent = 'Taking Away';
        document.getElementById('dineinCounter').classList.add('hidden');
        document.getElementById('dineinLabel').textContent = 'Dining In';
        document.getElementById('mealsValue').textContent = '1';
        document.getElementById('guestsValue').textContent = '1';
      }
      if (!showBags) {
        guestData.bags = 1;
        document.getElementById('bagsValue').textContent = '1';
      }

      if (shouldReset) resetForm();
      updateSubmitState();
    }

    // ─── Inline Guests Counter (Dining In) ────────────────────────
    document.getElementById('guestsPlus').addEventListener('click', (e) => {
      e.stopPropagation();
      guestData.guests++;
      document.getElementById('guestsValue').textContent = guestData.guests;
    });

    document.getElementById('guestsMinus').addEventListener('click', (e) => {
      e.stopPropagation();
      if (guestData.guests > 1) {
        guestData.guests--;
        document.getElementById('guestsValue').textContent = guestData.guests;
      }
    });

    // ─── Inline Meals Counter (Taking Away) ───────────────────────
    document.getElementById('mealsPlus').addEventListener('click', (e) => {
      e.stopPropagation();
      guestData.meals++;
      document.getElementById('mealsValue').textContent = guestData.meals;
    });

    document.getElementById('mealsMinus').addEventListener('click', (e) => {
      e.stopPropagation();
      if (guestData.meals > 1) {
        guestData.meals--;
        document.getElementById('mealsValue').textContent = guestData.meals;
      }
    });

    // ─── Bags Counter ─────────────────────────────────────────────
    document.getElementById('bagsPlus').addEventListener('click', () => {
      guestData.bags++;
      document.getElementById('bagsValue').textContent = guestData.bags;
    });

    document.getElementById('bagsMinus').addEventListener('click', () => {
      if (guestData.bags > 1) {
        guestData.bags--;
        document.getElementById('bagsValue').textContent = guestData.bags;
      }
    });

    // ─── Zip Code buttons ─────────────────────────────────────────
    document.querySelectorAll('[data-zip]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const zip = btn.getAttribute('data-zip');
        if (zip === 'other') {
          document.getElementById('otherZipRow').classList.add('show');
          document.getElementById('otherZipInput').focus();
          return;
        }
        document.getElementById('otherZipRow').classList.remove('show');
        document.getElementById('otherZipInput').value = '';
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.zipCode = '';
        } else {
          selectInGroup('[data-zip]', btn);
          guestData.zipCode = zip;
        }
        updateSubmitState();
      });
    });

    document.getElementById('otherZipOk').addEventListener('click', () => {
      const val = document.getElementById('otherZipInput').value.trim();
      if (val.length >= 3) {
        document.querySelectorAll('[data-zip]').forEach((b) => b.classList.remove('selected'));
        document.querySelector('[data-zip="other"]').classList.add('selected');
        guestData.zipCode = val;
        updateSubmitState();
      }
    });

    document.getElementById('otherZipInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('otherZipOk').click();
    });

    // ─── Visit Type buttons ───────────────────────────────────────
    document.querySelectorAll('[data-visit]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.visitType = '';
        } else {
          selectInGroup('[data-visit]', btn);
          guestData.visitType = btn.getAttribute('data-visit');
        }

        const isDineIn = guestData.visitType === 'Dining In';
        const isTakeaway = guestData.visitType === 'Taking Away';

        document.getElementById('dineinCounter').classList.toggle('hidden', !isDineIn);
        document.getElementById('dineinLabel').textContent = isDineIn ? 'Guests:' : 'Dining In';
        if (!isDineIn) {
          guestData.guests = 1;
          document.getElementById('guestsValue').textContent = '1';
        }

        document.getElementById('takeawayCounter').classList.toggle('hidden', !isTakeaway);
        document.getElementById('takeawayLabel').textContent = isTakeaway ? 'Meals:' : 'Taking Away';
        if (!isTakeaway) {
          guestData.meals = 1;
          document.getElementById('mealsValue').textContent = '1';
        }

        updateSubmitState();
      });
    });

    // ─── Age Range buttons ────────────────────────────────────────
    document.querySelectorAll('[data-age]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.ageRange = '';
        } else {
          selectInGroup('[data-age]', btn);
          guestData.ageRange = btn.getAttribute('data-age');
        }
        updateSubmitState();
      });
    });

    // ─── First Visit toggle ──────────────────────────────────────
    document.getElementById('firstVisitBtn').addEventListener('click', () => {
      guestData.firstVisit = !guestData.firstVisit;
      document.getElementById('firstVisitBtn').classList.toggle('selected', guestData.firstVisit);
    });

    // ─── Submit ───────────────────────────────────────────────────
    submitBtn.addEventListener('click', () => {
      if (!isReady()) return;

      const rawName = nameInput.value.trim();
      guestData.name = rawName || 'Anonymous Guest';

      const entry = {
        mode: mode,
        name: guestData.name,
        zipCode: guestData.zipCode,
        ageRange: guestData.ageRange,
        firstVisit: guestData.firstVisit,
        timestamp: new Date().toISOString(),
      };

      let totalPeople = 1;

      if (mode === 'restaurant' || mode === 'both') {
        entry.visitType = guestData.visitType;
        if (guestData.visitType === 'Dining In') {
          entry.meals = guestData.guests;
          totalPeople = guestData.guests;
        } else {
          entry.meals = guestData.meals;
          totalPeople = guestData.meals;
        }
      }

      if (mode === 'pantry' || mode === 'both') {
        entry.bags = guestData.bags;
      }

      // Save to guest history for autocomplete
      saveGuestToHistory(guestData.name, guestData.zipCode);

      localCount += totalPeople;
      saveLocalCount();
      updateCountDisplay();

      // Flash green
      const flash = document.getElementById('flash');
      flash.classList.remove('show');
      void flash.offsetWidth;
      flash.classList.add('show');

      addToQueue(entry);
      processQueue();
      resetForm();
    });

    // ─── Helpers ──────────────────────────────────────────────────
    function selectInGroup(selector, activeBtn) {
      document.querySelectorAll(selector).forEach((b) => b.classList.remove('selected'));
      activeBtn.classList.add('selected');
    }

    function isReady() {
      if (!guestData.zipCode || !guestData.ageRange || !mode) return false;
      if ((mode === 'restaurant' || mode === 'both') && !guestData.visitType) return false;
      return true;
    }

    function updateSubmitState() {
      if (isReady()) {
        submitBtn.classList.add('ready');
        submitBtn.disabled = false;
      } else {
        submitBtn.classList.remove('ready');
        submitBtn.disabled = true;
      }
    }

    function resetForm() {
      guestData = { name: '', zipCode: '', visitType: '', ageRange: '', meals: 1, guests: 1, bags: 1, firstVisit: false };
      nameInput.value = '';
      document.querySelectorAll('.btn.selected').forEach((b) => b.classList.remove('selected'));
      document.getElementById('firstVisitBtn').classList.remove('selected');
      document.getElementById('otherZipRow').classList.remove('show');
      document.getElementById('otherZipInput').value = '';
      document.getElementById('mealsValue').textContent = '1';
      document.getElementById('guestsValue').textContent = '1';
      document.getElementById('takeawayCounter').classList.add('hidden');
      document.getElementById('takeawayLabel').textContent = 'Taking Away';
      document.getElementById('dineinCounter').classList.add('hidden');
      document.getElementById('dineinLabel').textContent = 'Dining In';
      document.getElementById('bagsValue').textContent = '1';
      // Keep mode-specific sections visible (don't hide them)
      // Reset visit type selection within visible sections
      hideAutocomplete();
      updateSubmitState();
      nameInput.focus();
    }

    // ─── Offline Queue ────────────────────────────────────────────
    function getQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      updateQueueDisplay();
    }

    function addToQueue(entry) {
      const queue = getQueue();
      queue.push(entry);
      saveQueue(queue);
    }

    function updateQueueDisplay() {
      const queue = getQueue();
      const el = document.getElementById('queueCount');
      if (queue.length > 0) {
        el.textContent = queue.length + ' queued';
        el.classList.add('show');
      } else {
        el.classList.remove('show');
      }
    }

    let processing = false;

    async function processQueue() {
      if (!navigator.onLine || processing) return;
      processing = true;

      try {
        let queue = getQueue();

        while (queue.length > 0) {
          const entry = queue[0];
          try {
            let endpoint = '/api/checkin';
            if (entry.mode === 'pantry') endpoint = '/api/checkin/pantry';
            else if (entry.mode === 'both') endpoint = '/api/checkin/both';

            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(entry),
            });
            if (res.ok) {
              queue.shift();
              saveQueue(queue);
            } else {
              break;
            }
          } catch {
            break;
          }
        }
      } finally {
        processing = false;
      }
    }

    setInterval(processQueue, 10000);

    // ─── Guest Count ──────────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function loadLocalCount() {
      const savedDate = localStorage.getItem(COUNT_DATE_KEY);
      if (savedDate === todayStr()) {
        return parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
      }
      localStorage.setItem(COUNT_KEY, '0');
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
      return 0;
    }

    function saveLocalCount() {
      localStorage.setItem(COUNT_KEY, String(localCount));
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
    }

    function updateCountDisplay() {
      document.getElementById('guestCount').textContent = localCount;
    }

    async function fetchServerCount() {
      try {
        const res = await fetch('/api/checkin/count');
        if (res.ok) {
          const data = await res.json();
          if (data.count > localCount) {
            localCount = data.count;
            saveLocalCount();
            updateCountDisplay();
          }
        }
      } catch {}
    }
  </script>
</body>
</html>
