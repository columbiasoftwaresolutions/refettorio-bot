<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Refettorio Guest Check-In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #2d2d2d;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #2d2d2d;
    }

    .guest-count {
      font-size: 16px;
      color: #888;
      font-weight: 500;
    }

    .guest-count span {
      color: #4CAF82;
      font-weight: 700;
    }

    /* Offline banner */
    .offline-banner {
      display: none;
      background: #e74c3c;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .offline-banner.show {
      display: block;
    }

    /* Main content — use all available space */
    .main {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr 1fr 1fr;
      padding: 8px 12px;
      gap: 8px;
      overflow: hidden;
    }

    /* Section cards */
    .section {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Text input — compact */
    .text-input {
      width: 100%;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      outline: none;
    }

    .text-input:focus {
      border-color: #4CAF82;
    }

    .text-input::placeholder {
      color: #bbb;
    }

    /* Other zip input row */
    .other-zip-row {
      display: none;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .other-zip-row.show {
      display: flex;
    }

    .zip-input {
      width: 120px;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      text-align: center;
      outline: none;
    }

    .zip-input:focus {
      border-color: #4CAF82;
    }

    .zip-ok-btn {
      min-height: 44px;
      padding: 8px 20px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #4CAF82;
      color: #fff;
      cursor: pointer;
    }

    /* Button grids — fill available space */
    .btn-grid {
      display: grid;
      gap: 6px;
      flex: 1;
    }

    .btn-grid.cols-2 {
      grid-template-columns: 1fr 1fr;
    }

    .btn-grid.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    /* Zip: 3 columns, 2 rows */
    .btn-grid.zip-grid {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* Selection buttons — fill their grid cell */
    .btn {
      font-size: 22px;
      font-weight: 600;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      user-select: none;
      min-height: 0;
    }

    .btn:active {
      background: #e8f5e9;
    }

    .btn.selected {
      background: #4CAF82;
      border-color: #4CAF82;
      color: #ffffff;
    }

    .btn-other {
      font-size: 18px;
      color: #999;
    }

    /* Check In button */
    .submit-bar {
      padding: 8px 12px 12px;
    }

    .btn-submit {
      width: 100%;
      min-height: 60px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: #ddd;
      color: #fff;
      cursor: not-allowed;
      transition: background 0.15s;
      user-select: none;
    }

    .btn-submit.ready {
      background: #4CAF82;
      cursor: pointer;
    }

    .btn-submit.ready:active {
      background: #3d9e72;
    }

    /* Success flash */
    .flash {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(76, 175, 130, 0.18);
      z-index: 100;
      pointer-events: none;
    }

    .flash.show {
      display: block;
      animation: flashAnim 0.4s ease-out forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Queue indicator */
    .queue-count {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: #e74c3c;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .queue-count.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Refettorio Harlem</h1>
    <div class="guest-count">Today: <span id="guestCount">0</span> guests</div>
  </div>

  <div class="offline-banner" id="offlineBanner">Offline — submissions will sync when wifi returns</div>

  <div class="flash" id="flash"></div>

  <div class="main">

    <!-- Name — compact, top row -->
    <div class="section">
      <div class="section-label">Name (optional)</div>
      <input type="text" class="text-input" id="nameInput" placeholder="First name or skip" autocomplete="off" autocorrect="off" autocapitalize="words">
    </div>

    <!-- Zip Code — 3x2 grid of big buttons -->
    <div class="section">
      <div class="section-label">Zip Code</div>
      <div class="btn-grid zip-grid">
        <button class="btn" data-zip="10027">10027</button>
        <button class="btn" data-zip="10030">10030</button>
        <button class="btn" data-zip="10031">10031</button>
        <button class="btn" data-zip="10037">10037</button>
        <button class="btn" data-zip="10039">10039</button>
        <button class="btn btn-other" data-zip="other">Other</button>
      </div>
      <div class="other-zip-row" id="otherZipRow">
        <input type="number" class="zip-input" id="otherZipInput" placeholder="Zip" maxlength="5" inputmode="numeric">
        <button class="zip-ok-btn" id="otherZipOk">OK</button>
      </div>
    </div>

    <!-- Visit Type — 2 big buttons, fill height -->
    <div class="section">
      <div class="section-label">Visit Type</div>
      <div class="btn-grid cols-2">
        <button class="btn" data-visit="Dining In">Dining In</button>
        <button class="btn" data-visit="Taking Away">Taking Away</button>
      </div>
    </div>

    <!-- Age Range — 3 big buttons, fill height -->
    <div class="section">
      <div class="section-label">Age Range</div>
      <div class="btn-grid cols-3">
        <button class="btn" data-age="Under 18">Under 18</button>
        <button class="btn" data-age="18-59">18 – 59</button>
        <button class="btn" data-age="60+">60+</button>
      </div>
    </div>

  </div>

  <div class="submit-bar">
    <button class="btn-submit" id="submitBtn" disabled>Check In</button>
  </div>

  <div class="queue-count" id="queueCount"></div>

  <script>
    // ─── State ────────────────────────────────────────────────────
    const QUEUE_KEY = 'refettorio_checkin_queue';
    const COUNT_KEY = 'refettorio_guest_count';
    const COUNT_DATE_KEY = 'refettorio_guest_count_date';

    let guestData = { name: '', zipCode: '', visitType: '', ageRange: '' };
    let localCount = loadLocalCount();

    const submitBtn = document.getElementById('submitBtn');
    const nameInput = document.getElementById('nameInput');

    // ─── Init ─────────────────────────────────────────────────────
    updateCountDisplay();
    fetchServerCount();
    processQueue();

    // Check online/offline
    window.addEventListener('online', () => {
      document.getElementById('offlineBanner').classList.remove('show');
      processQueue();
    });
    window.addEventListener('offline', () => {
      document.getElementById('offlineBanner').classList.add('show');
    });
    if (!navigator.onLine) {
      document.getElementById('offlineBanner').classList.add('show');
    }

    // ─── Zip Code buttons ─────────────────────────────────────────
    document.querySelectorAll('[data-zip]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const zip = btn.getAttribute('data-zip');
        if (zip === 'other') {
          document.getElementById('otherZipRow').classList.add('show');
          document.getElementById('otherZipInput').focus();
          return;
        }
        document.getElementById('otherZipRow').classList.remove('show');
        document.getElementById('otherZipInput').value = '';
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.zipCode = '';
        } else {
          selectInGroup('[data-zip]', btn);
          guestData.zipCode = zip;
        }
        updateSubmitState();
      });
    });

    document.getElementById('otherZipOk').addEventListener('click', () => {
      const val = document.getElementById('otherZipInput').value.trim();
      if (val.length >= 3) {
        document.querySelectorAll('[data-zip]').forEach((b) => b.classList.remove('selected'));
        document.querySelector('[data-zip="other"]').classList.add('selected');
        guestData.zipCode = val;
        updateSubmitState();
      }
    });

    document.getElementById('otherZipInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('otherZipOk').click();
    });

    // ─── Visit Type buttons ───────────────────────────────────────
    document.querySelectorAll('[data-visit]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.visitType = '';
        } else {
          selectInGroup('[data-visit]', btn);
          guestData.visitType = btn.getAttribute('data-visit');
        }
        updateSubmitState();
      });
    });

    // ─── Age Range buttons ────────────────────────────────────────
    document.querySelectorAll('[data-age]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.ageRange = '';
        } else {
          selectInGroup('[data-age]', btn);
          guestData.ageRange = btn.getAttribute('data-age');
        }
        updateSubmitState();
      });
    });

    // ─── Submit ───────────────────────────────────────────────────
    submitBtn.addEventListener('click', () => {
      if (!isReady()) return;

      guestData.name = nameInput.value.trim();

      const entry = {
        name: guestData.name,
        zipCode: guestData.zipCode,
        visitType: guestData.visitType,
        ageRange: guestData.ageRange,
        timestamp: new Date().toISOString(),
      };

      // Increment local count
      localCount++;
      saveLocalCount();
      updateCountDisplay();

      // Flash green
      const flash = document.getElementById('flash');
      flash.classList.remove('show');
      void flash.offsetWidth;
      flash.classList.add('show');

      // Queue the submission
      addToQueue(entry);
      processQueue();

      // Reset
      resetForm();
    });

    // ─── Helpers ──────────────────────────────────────────────────
    function selectInGroup(selector, activeBtn) {
      document.querySelectorAll(selector).forEach((b) => b.classList.remove('selected'));
      activeBtn.classList.add('selected');
    }

    function isReady() {
      return guestData.zipCode && guestData.visitType && guestData.ageRange;
    }

    function updateSubmitState() {
      if (isReady()) {
        submitBtn.classList.add('ready');
        submitBtn.disabled = false;
      } else {
        submitBtn.classList.remove('ready');
        submitBtn.disabled = true;
      }
    }

    function resetForm() {
      guestData = { name: '', zipCode: '', visitType: '', ageRange: '' };
      nameInput.value = '';
      document.querySelectorAll('.btn.selected').forEach((b) => b.classList.remove('selected'));
      document.getElementById('otherZipRow').classList.remove('show');
      document.getElementById('otherZipInput').value = '';
      updateSubmitState();
      nameInput.focus();
    }

    // ─── Offline Queue ────────────────────────────────────────────
    function getQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      updateQueueDisplay();
    }

    function addToQueue(entry) {
      const queue = getQueue();
      queue.push(entry);
      saveQueue(queue);
    }

    function updateQueueDisplay() {
      const queue = getQueue();
      const el = document.getElementById('queueCount');
      if (queue.length > 0) {
        el.textContent = queue.length + ' queued';
        el.classList.add('show');
      } else {
        el.classList.remove('show');
      }
    }

    async function processQueue() {
      if (!navigator.onLine) return;

      const queue = getQueue();
      if (queue.length === 0) return;

      const remaining = [];

      for (const entry of queue) {
        try {
          const res = await fetch('/api/checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry),
          });
          if (!res.ok) {
            remaining.push(entry);
          }
        } catch {
          remaining.push(entry);
        }
      }

      saveQueue(remaining);
    }

    // Retry queue every 30 seconds
    setInterval(processQueue, 30000);

    // ─── Guest Count ──────────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function loadLocalCount() {
      const savedDate = localStorage.getItem(COUNT_DATE_KEY);
      if (savedDate === todayStr()) {
        return parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
      }
      localStorage.setItem(COUNT_KEY, '0');
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
      return 0;
    }

    function saveLocalCount() {
      localStorage.setItem(COUNT_KEY, String(localCount));
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
    }

    function updateCountDisplay() {
      document.getElementById('guestCount').textContent = localCount;
    }

    async function fetchServerCount() {
      try {
        const res = await fetch('/api/checkin/count');
        if (res.ok) {
          const data = await res.json();
          if (data.count > localCount) {
            localCount = data.count;
            saveLocalCount();
            updateCountDisplay();
          }
        }
      } catch {
        // Use local count as fallback
      }
    }
  </script>
</body>
</html>
