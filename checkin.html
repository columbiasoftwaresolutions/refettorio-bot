<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Refettorio Guest Check-In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #2d2d2d;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #2d2d2d;
    }

    .guest-count {
      font-size: 16px;
      color: #888;
      font-weight: 500;
    }

    .guest-count span {
      color: #4CAF82;
      font-weight: 700;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      margin: 8px 12px 0;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 3px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #999;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active {
      background: #4CAF82;
      color: #ffffff;
    }

    /* Offline banner */
    .offline-banner {
      display: none;
      background: #e74c3c;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .offline-banner.show {
      display: block;
    }

    /* Main content */
    .main {
      flex: 1;
      display: grid;
      padding: 8px 12px;
      gap: 8px;
      overflow: hidden;
    }

    .main.restaurant-layout {
      grid-template-rows: auto 1fr 1fr 1fr;
    }

    .main.pantry-layout {
      grid-template-rows: auto auto 1fr 1fr;
    }

    /* Section cards */
    .section {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
    }

    .section.hidden {
      display: none;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Text input */
    .text-input {
      width: 100%;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      outline: none;
    }

    .text-input:focus {
      border-color: #4CAF82;
    }

    .text-input::placeholder {
      color: #bbb;
    }

    /* Other zip input row */
    .other-zip-row {
      display: none;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .other-zip-row.show {
      display: flex;
    }

    .zip-input {
      width: 120px;
      font-size: 20px;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #ffffff;
      color: #2d2d2d;
      text-align: center;
      outline: none;
    }

    .zip-input:focus {
      border-color: #4CAF82;
    }

    .zip-ok-btn {
      min-height: 44px;
      padding: 8px 20px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #4CAF82;
      color: #fff;
      cursor: pointer;
    }

    /* Button grids */
    .btn-grid {
      display: grid;
      gap: 6px;
      flex: 1;
    }

    .btn-grid.cols-2 {
      grid-template-columns: 1fr 1fr;
    }

    .btn-grid.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .btn-grid.zip-grid {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* Selection buttons */
    .btn {
      font-size: 22px;
      font-weight: 600;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      user-select: none;
      min-height: 0;
    }

    .btn:active {
      background: #e8f5e9;
    }

    .btn.selected {
      background: #4CAF82;
      border-color: #4CAF82;
      color: #ffffff;
    }

    .btn-other {
      font-size: 18px;
      color: #999;
    }

    /* Inline counter (inside Taking Away button) */
    .inline-counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 8px;
    }

    .inline-counter.hidden {
      display: none;
    }

    .inline-counter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      color: #fff;
      user-select: none;
      cursor: pointer;
    }

    .inline-counter-btn:active {
      background: rgba(255,255,255,0.5);
    }

    .inline-counter-val {
      font-size: 26px;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }

    /* Counter (bags) */
    .counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
    }

    .counter-btn {
      width: 64px;
      height: 64px;
      font-size: 32px;
      font-weight: 700;
      border: 2px solid #e0e0e0;
      border-radius: 50%;
      background: #ffffff;
      color: #2d2d2d;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background 0.12s;
    }

    .counter-btn:active {
      background: #e8f5e9;
    }

    .counter-value {
      font-size: 48px;
      font-weight: 700;
      color: #2d2d2d;
      min-width: 80px;
      text-align: center;
    }

    /* Check In button */
    .submit-bar {
      padding: 8px 12px 12px;
    }

    .btn-submit {
      width: 100%;
      min-height: 60px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: #ddd;
      color: #fff;
      cursor: not-allowed;
      transition: background 0.15s;
      user-select: none;
    }

    .btn-submit.ready {
      background: #4CAF82;
      cursor: pointer;
    }

    .btn-submit.ready:active {
      background: #3d9e72;
    }

    /* Success flash */
    .flash {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(76, 175, 130, 0.18);
      z-index: 100;
      pointer-events: none;
    }

    .flash.show {
      display: block;
      animation: flashAnim 0.4s ease-out forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Queue indicator */
    .queue-count {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: #e74c3c;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .queue-count.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Refettorio Harlem</h1>
    <div class="guest-count">Today: <span id="guestCount">0</span> guests</div>
  </div>

  <div class="offline-banner" id="offlineBanner">Offline — submissions will sync when wifi returns</div>

  <div class="flash" id="flash"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeRestaurant">Restaurant</button>
    <button class="mode-btn" id="modePantry">Pantry</button>
  </div>

  <div class="main restaurant-layout" id="mainContent">

    <!-- Name -->
    <div class="section" id="sectionName">
      <div class="section-label">Name (optional)</div>
      <input type="text" class="text-input" id="nameInput" placeholder="First name or skip" autocomplete="off" autocorrect="off" autocapitalize="words">
    </div>

    <!-- Bags counter (pantry — hidden by default) -->
    <div class="section hidden" id="sectionBags">
      <div class="section-label">Number of Bags</div>
      <div class="counter">
        <button class="counter-btn" id="bagsMinus">&minus;</button>
        <div class="counter-value" id="bagsValue">1</div>
        <button class="counter-btn" id="bagsPlus">+</button>
      </div>
    </div>

    <!-- Zip Code -->
    <div class="section" id="sectionZip">
      <div class="section-label">Zip Code</div>
      <div class="btn-grid zip-grid">
        <button class="btn" data-zip="10027">10027</button>
        <button class="btn" data-zip="10030">10030</button>
        <button class="btn" data-zip="10031">10031</button>
        <button class="btn" data-zip="10037">10037</button>
        <button class="btn" data-zip="10039">10039</button>
        <button class="btn btn-other" data-zip="other">Other</button>
      </div>
      <div class="other-zip-row" id="otherZipRow">
        <input type="number" class="zip-input" id="otherZipInput" placeholder="Zip" maxlength="5" inputmode="numeric">
        <button class="zip-ok-btn" id="otherZipOk">OK</button>
      </div>
    </div>

    <!-- Visit Type (restaurant only) -->
    <div class="section" id="sectionVisit">
      <div class="section-label">Visit Type</div>
      <div class="btn-grid cols-2">
        <button class="btn" data-visit="Dining In">Dining In</button>
        <button class="btn" data-visit="Taking Away" id="takeawayBtn">
          <span id="takeawayLabel">Taking Away</span>
          <span id="takeawayCounter" class="inline-counter hidden">
            <span class="inline-counter-btn" id="mealsMinus">&minus;</span>
            <span class="inline-counter-val" id="mealsValue">1</span>
            <span class="inline-counter-btn" id="mealsPlus">+</span>
          </span>
        </button>
      </div>
    </div>

    <!-- Age Range -->
    <div class="section" id="sectionAge">
      <div class="section-label">Age Range</div>
      <div class="btn-grid cols-3">
        <button class="btn" data-age="Under 18">Under 18</button>
        <button class="btn" data-age="18-59">18 – 59</button>
        <button class="btn" data-age="60+">60+</button>
      </div>
    </div>

  </div>

  <div class="submit-bar">
    <button class="btn-submit" id="submitBtn" disabled>Check In</button>
  </div>

  <div class="queue-count" id="queueCount"></div>

  <script>
    // ─── State ────────────────────────────────────────────────────
    const QUEUE_KEY = 'refettorio_checkin_queue';
    const COUNT_KEY = 'refettorio_guest_count';
    const COUNT_DATE_KEY = 'refettorio_guest_count_date';
    const MODE_KEY = 'refettorio_checkin_mode';

    let mode = localStorage.getItem(MODE_KEY) || 'restaurant';
    let guestData = { name: '', zipCode: '', visitType: '', ageRange: '', meals: 1, bags: 1 };
    let localCount = loadLocalCount();

    const submitBtn = document.getElementById('submitBtn');
    const nameInput = document.getElementById('nameInput');
    const mainContent = document.getElementById('mainContent');

    // ─── Init ─────────────────────────────────────────────────────
    applyMode(mode);
    updateCountDisplay();
    fetchServerCount();
    processQueue();

    // Online/offline
    window.addEventListener('online', () => {
      document.getElementById('offlineBanner').classList.remove('show');
      // Delay to let connection stabilize, then retry a few times
      setTimeout(processQueue, 1000);
      setTimeout(processQueue, 5000);
      setTimeout(processQueue, 15000);
    });
    window.addEventListener('offline', () => {
      document.getElementById('offlineBanner').classList.add('show');
    });
    if (!navigator.onLine) {
      document.getElementById('offlineBanner').classList.add('show');
    }

    // ─── Mode Toggle ──────────────────────────────────────────────
    document.getElementById('modeRestaurant').addEventListener('click', () => applyMode('restaurant'));
    document.getElementById('modePantry').addEventListener('click', () => applyMode('pantry'));

    function applyMode(newMode) {
      mode = newMode;
      localStorage.setItem(MODE_KEY, mode);

      document.getElementById('modeRestaurant').classList.toggle('active', mode === 'restaurant');
      document.getElementById('modePantry').classList.toggle('active', mode === 'pantry');

      // Show/hide sections
      document.getElementById('sectionVisit').classList.toggle('hidden', mode !== 'restaurant');
      document.getElementById('sectionBags').classList.toggle('hidden', mode !== 'pantry');
      // Reset inline takeaway counter
      document.getElementById('takeawayCounter').classList.add('hidden');
      document.getElementById('takeawayLabel').textContent = 'Taking Away';

      // Update grid layout
      if (mode === 'restaurant') {
        mainContent.className = 'main restaurant-layout';
      } else {
        mainContent.className = 'main pantry-layout';
      }

      resetForm();
    }

    // ─── Inline Meals Counter (inside Taking Away button) ─────────
    document.getElementById('mealsPlus').addEventListener('click', (e) => {
      e.stopPropagation();
      guestData.meals++;
      document.getElementById('mealsValue').textContent = guestData.meals;
    });

    document.getElementById('mealsMinus').addEventListener('click', (e) => {
      e.stopPropagation();
      if (guestData.meals > 1) {
        guestData.meals--;
        document.getElementById('mealsValue').textContent = guestData.meals;
      }
    });

    // ─── Bags Counter ─────────────────────────────────────────────
    document.getElementById('bagsPlus').addEventListener('click', () => {
      guestData.bags++;
      document.getElementById('bagsValue').textContent = guestData.bags;
    });

    document.getElementById('bagsMinus').addEventListener('click', () => {
      if (guestData.bags > 1) {
        guestData.bags--;
        document.getElementById('bagsValue').textContent = guestData.bags;
      }
    });

    // ─── Zip Code buttons ─────────────────────────────────────────
    document.querySelectorAll('[data-zip]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const zip = btn.getAttribute('data-zip');
        if (zip === 'other') {
          document.getElementById('otherZipRow').classList.add('show');
          document.getElementById('otherZipInput').focus();
          return;
        }
        document.getElementById('otherZipRow').classList.remove('show');
        document.getElementById('otherZipInput').value = '';
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.zipCode = '';
        } else {
          selectInGroup('[data-zip]', btn);
          guestData.zipCode = zip;
        }
        updateSubmitState();
      });
    });

    document.getElementById('otherZipOk').addEventListener('click', () => {
      const val = document.getElementById('otherZipInput').value.trim();
      if (val.length >= 3) {
        document.querySelectorAll('[data-zip]').forEach((b) => b.classList.remove('selected'));
        document.querySelector('[data-zip="other"]').classList.add('selected');
        guestData.zipCode = val;
        updateSubmitState();
      }
    });

    document.getElementById('otherZipInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('otherZipOk').click();
    });

    // ─── Visit Type buttons ───────────────────────────────────────
    document.querySelectorAll('[data-visit]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.visitType = '';
        } else {
          selectInGroup('[data-visit]', btn);
          guestData.visitType = btn.getAttribute('data-visit');
        }
        // Show inline meals counter only when Taking Away is selected
        const showMeals = guestData.visitType === 'Taking Away';
        document.getElementById('takeawayCounter').classList.toggle('hidden', !showMeals);
        document.getElementById('takeawayLabel').textContent = showMeals ? 'Meals:' : 'Taking Away';
        if (!showMeals) {
          guestData.meals = 1;
          document.getElementById('mealsValue').textContent = '1';
        }
        updateSubmitState();
      });
    });

    // ─── Age Range buttons ────────────────────────────────────────
    document.querySelectorAll('[data-age]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('selected')) {
          btn.classList.remove('selected');
          guestData.ageRange = '';
        } else {
          selectInGroup('[data-age]', btn);
          guestData.ageRange = btn.getAttribute('data-age');
        }
        updateSubmitState();
      });
    });

    // ─── Submit ───────────────────────────────────────────────────
    submitBtn.addEventListener('click', () => {
      if (!isReady()) return;

      guestData.name = nameInput.value.trim();

      const entry = {
        mode: mode,
        name: guestData.name,
        zipCode: guestData.zipCode,
        ageRange: guestData.ageRange,
        timestamp: new Date().toISOString(),
      };

      if (mode === 'restaurant') {
        entry.visitType = guestData.visitType;
        entry.meals = guestData.meals;
      } else {
        entry.bags = guestData.bags;
      }

      localCount++;
      saveLocalCount();
      updateCountDisplay();

      // Flash green
      const flash = document.getElementById('flash');
      flash.classList.remove('show');
      void flash.offsetWidth;
      flash.classList.add('show');

      addToQueue(entry);
      processQueue();
      resetForm();
    });

    // ─── Helpers ──────────────────────────────────────────────────
    function selectInGroup(selector, activeBtn) {
      document.querySelectorAll(selector).forEach((b) => b.classList.remove('selected'));
      activeBtn.classList.add('selected');
    }

    function isReady() {
      if (!guestData.zipCode || !guestData.ageRange) return false;
      if (mode === 'restaurant' && !guestData.visitType) return false;
      return true;
    }

    function updateSubmitState() {
      if (isReady()) {
        submitBtn.classList.add('ready');
        submitBtn.disabled = false;
      } else {
        submitBtn.classList.remove('ready');
        submitBtn.disabled = true;
      }
    }

    function resetForm() {
      guestData = { name: '', zipCode: '', visitType: '', ageRange: '', meals: 1, bags: 1 };
      nameInput.value = '';
      document.querySelectorAll('.btn.selected').forEach((b) => b.classList.remove('selected'));
      document.getElementById('otherZipRow').classList.remove('show');
      document.getElementById('otherZipInput').value = '';
      document.getElementById('mealsValue').textContent = '1';
      document.getElementById('takeawayCounter').classList.add('hidden');
      document.getElementById('takeawayLabel').textContent = 'Taking Away';
      document.getElementById('bagsValue').textContent = '1';
      updateSubmitState();
      nameInput.focus();
    }

    // ─── Offline Queue ────────────────────────────────────────────
    function getQueue() {
      try {
        return JSON.parse(localStorage.getItem(QUEUE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      updateQueueDisplay();
    }

    function addToQueue(entry) {
      const queue = getQueue();
      queue.push(entry);
      saveQueue(queue);
    }

    function updateQueueDisplay() {
      const queue = getQueue();
      const el = document.getElementById('queueCount');
      if (queue.length > 0) {
        el.textContent = queue.length + ' queued';
        el.classList.add('show');
      } else {
        el.classList.remove('show');
      }
    }

    let processing = false;

    async function processQueue() {
      if (!navigator.onLine || processing) return;
      processing = true;

      try {
        let queue = getQueue();

        while (queue.length > 0) {
          const entry = queue[0];
          try {
            const endpoint = entry.mode === 'pantry' ? '/api/checkin/pantry' : '/api/checkin';
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(entry),
            });
            if (res.ok) {
              queue.shift(); // remove the successful one
              saveQueue(queue);
            } else {
              break; // server error, retry later
            }
          } catch {
            break; // network error, retry later
          }
        }
      } finally {
        processing = false;
      }
    }

    setInterval(processQueue, 10000);

    // ─── Guest Count ──────────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function loadLocalCount() {
      const savedDate = localStorage.getItem(COUNT_DATE_KEY);
      if (savedDate === todayStr()) {
        return parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
      }
      localStorage.setItem(COUNT_KEY, '0');
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
      return 0;
    }

    function saveLocalCount() {
      localStorage.setItem(COUNT_KEY, String(localCount));
      localStorage.setItem(COUNT_DATE_KEY, todayStr());
    }

    function updateCountDisplay() {
      document.getElementById('guestCount').textContent = localCount;
    }

    async function fetchServerCount() {
      try {
        const res = await fetch('/api/checkin/count');
        if (res.ok) {
          const data = await res.json();
          if (data.count > localCount) {
            localCount = data.count;
            saveLocalCount();
            updateCountDisplay();
          }
        }
      } catch {}
    }
  </script>
</body>
</html>
